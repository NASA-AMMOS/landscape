# yaml-language-server: $schema=https://raw.githubusercontent.com/cncf/landscape2/refs/heads/main/docs/config/schema/guide.schema.json
#
# Per-category descriptions surfaced in the landscape's Guide tab.
# Markdown is supported in `content` fields.

categories:
  - category: Mission Design & Navigation
    content: |
      Software supporting the design, analysis, and optimization of
      spacecraft trajectories and orbits — from launch through
      end-of-mission. Includes tools for trajectory search and
      optimization, orbit determination, maneuver design and
      analysis, ephemerides, and gravity modeling.

      The domain is heavily standards-driven. Trajectory and ephemeris
      data are exchanged using the
      [CCSDS Navigation Data Messages](https://ccsds.org/Pubs/500x2g3.pdf)
      family — the Orbit Parameter Message (OPM), Orbit Mean-Elements
      Message (OMM), and Orbit Ephemeris Message (OEM) — alongside
      JPL's [SPICE Ancillary Information System](https://naif.jpl.nasa.gov/naif/),
      the de-facto exchange mechanism inside JPL Navigation and the
      Deep Space Network.
    subcategories:
      - subcategory: Mission Analysis & Trajectory Design
        content: |
          End-to-end mission analysis, trajectory optimization, and
          multidisciplinary design optimization frameworks — generally
          interoperating via SPICE kernels and CCSDS Orbit Data
          Messages.

  - category: Mission Planning, Sequencing & Analysis
    content: |
      Tooling that translates science and engineering goals into
      executable command sequences — activity planning, sequence
      generation and validation, downlink and resource scheduling,
      relay planning, and the open specifications that bridge them.

      Standards in this area are coordinated by the
      [CCSDS Mission Planning and Scheduling Working Group](https://cwe.ccsds.org/fm/Lists/Charters/DispForm.aspx?ID=87)
      (formed 2015 with eight space agencies; published the
      [Mission Planning Green Book](https://ccsds.org/Pubs/529x0g1.pdf)
      in 2018) — defining common concepts of *activity*, *plan*,
      and *schedule* for cross-agency interoperability. NASA's
      open contributions to this stack live largely in the AMMOS
      MPSA element (PlanDev, seq-json).
    subcategories:
      - subcategory: Activity Planning & Scheduling
        content: |
          Modeling, simulation, and constraint-based scheduling of mission
          activities.
      - subcategory: Sequence Generation & Specifications
        content: |
          Open specifications, schemas, and execution languages for
          representing — and running — spacecraft command sequences
          and plans.

  - category: Instrument Data System
    content: |
      Capabilities for instrument operations and science data — product
      management, calibration, visualization, image processing & mapping,
      and autonomous instrument operations. Bridges flight instruments and
      the science teams that use their data.
    subcategories:
      - subcategory: Science Data Visualization & Mapping
        content: |
          Web-based and desktop tools for visualizing science products on
          Earth, lunar, and planetary surfaces.
      - subcategory: Instrument Toolkit
        content: |
          Instrument-side toolkits — commanding, telemetry, sequencing, and
          data-handling libraries — typically Python-based for
          instrument-class missions.

  - category: Mission Control System
    content: |
      Telemetry and command, secure uplink/downlink, data management,
      operations visualization, monitoring, and testbed support — the
      software that operations teams use to fly the spacecraft.

      The domain has 25+ years of standards convergence through the
      [CCSDS](https://ccsds.org/) — over 400 missions have used CCSDS
      protocols. The Mission Operations and Information Management
      Services (MOIMS) area hosts the
      [Spacecraft Monitor & Control (SM&C) Working Group](https://ccsds.org/outreach/overview/smcvideos/),
      which specifies a service-oriented architecture of standard
      mission-operations services. Many flight projects also adopt
      [XTCE](https://www.omg.org/spec/XTCE/) — XML Telemetry &
      Command Exchange — and the ECSS
      [Packet Utilization Standard (PUS)](https://pusopen.com/ecss-pus),
      which defines 23 standard onboard services for scheduling, data
      transfer, and reporting.
    subcategories:
      - subcategory: Mission Control Integration
        content: |
          Plugins and adapters connecting instrument data flows to mission
          control system frontends.

  - category: Engineering Software
    content: |
      Cross-cutting engineering software that mission projects build on
      top of — flight software frameworks, simulation environments,
      communications middleware, and robotics tooling. Spans NASA
      technology areas TX02 (Flight Computing), TX04 (Robotic Systems),
      TX05 (Communications), TX10 (Autonomous Systems), and TX11
      (Software, Modeling, Simulation).
    subcategories:
      - subcategory: Communications & Networking
        content: |
          Spacecraft, inter-vehicle, and ground-systems communications
          software — mesh networks, peer-to-peer protocols, network
          emulation, and messaging middleware that bridges flight and
          ground assets.
      - subcategory: Robotics & Autonomy
        content: |
          Robotics frameworks, perception engines, real-time control
          libraries, and autonomy agents — software that gives mobile
          and manipulator platforms the ability to sense, decide, and
          act in mission environments.

  - category: Science Data Systems
    content: |
      Software supporting NASA's science data archives —
      Earth observation, planetary, and astrophysics. Two
      programs anchor most of the work:

      - **[ESDS](https://www.earthdata.nasa.gov/about)** —
        Earth Science Data Systems Program. The
        [ESDIS Project](https://www.earthdata.nasa.gov/about/esdis)
        runs EOSDIS through **eleven DAACs** (ASF, ASDC, CDDIS,
        GHRC, GES DISC, LP DAAC, LAADS, NSIDC, ORNL DAAC,
        OB.DAAC, PO.DAAC). NASA Earth-science data has been
        *free and open to all users for any purpose* since
        1994, with software open-source since 2015.
      - **[PDS](https://pds.nasa.gov/)** — Planetary Data
        System. Federated archive across discipline nodes
        (Atmospheres, Geosciences, Imaging, Navigation &
        Ancillary Information / NAIF, Plasma Interactions,
        Ring-Moon Systems, Small Bodies) plus an Engineering
        Node that maintains the
        [PDS4 Information Model](https://nasa-pds.github.io/pds4-information-model/)
        and core tooling (validate, deep-archive, transform,
        the registry stack).

      Plus astrophysics archives operated by partner institutes
      (STScI for HST/JWST, HEASARC for high-energy, MAST for
      observations) — items from those missions live here too.

      The category collects cloud-native pipelines, services,
      search/discovery, and browse imagery that move science
      data from observation to analysis.

  - category: Developer Tools & Standards
    content: |
      Cross-cutting tooling for software development across mission
      programs — best-practices automation, lifecycle modernization, and
      open specifications that standardize how mission software is built.
    subcategories:
      - subcategory: Verification & Formal Methods
        content: |
          Theorem provers, formal proof libraries, and software
          verification tooling — mathematical correctness checks
          used to gain assurance in mission-critical software.

  - category: AMMOS
    content: |
      The **Advanced Multi-Mission Operations System** —
      *"Software to Empower Space Exploration."* AMMOS is a
      multi-center NASA program producing reusable mission-operations
      software across five architectural elements:

      - **MDN** (Mission Design & Navigation) — trajectory optimization
        and orbit determination
      - **MPSA** (Mission Planning, Sequencing & Analysis) — activity
        planning and sequence generation
      - **IDS** (Instrument Data System) — science data management
        and calibration
      - **MCS** (Mission Control System) — secure command, telemetry,
        and operations visualization
      - **Security** — application and data protection across the stack

      The program brings together teams from JPL/Caltech, GSFC, and
      ARC, with partners at Johns Hopkins APL and Carnegie Mellon SEI.
      Many AMMOS products are open source — program home at
      [ammos.nasa.gov](https://ammos.nasa.gov/), code at
      [github.com/NASA-AMMOS](https://github.com/NASA-AMMOS).

      This tab is a quick-filter view — items also appear in their
      primary mission-software category.
    subcategories:
      - subcategory: MPSA
        content: |
          Mission Planning, Sequencing & Analysis — activity planning
          and sequence generation, plus the analytical tooling around
          them.
      - subcategory: IDS
        content: |
          Instrument Data System — instrument toolkits, data
          management, calibration, and ground-data-system frontends.
      - subcategory: MCS
        content: |
          Mission Control System — secure command, telemetry, and
          operations visualization for in-flight mission control.
