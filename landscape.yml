                submitter.type: nasa-center
                nasa.center: JPL
                nasa.sponsor_program: PDS
                nasa.distribution: open-source

          - name: seq-json
            homepage_url: https://github.com/NASA-AMMOS/seq-json-schema
            logo: placeholder.svg
            second_path:
              - "AMMOS / MPSA"
            description: >-
              Open specification (JSON schema) for representing
              spacecraft command sequences. The interchange format
              underpinning PlanDev's SeqN sequencing language and
              adopted by multiple AMMOS tools.
            repo_url: https://github.com/NASA-AMMOS/seq-json-schema
            license: MIT
            project: ammos
            extra:
              tag:
                - nasa-center
                - jpl
                - mpsa
              specification: true
              annotations:
                submitter.org: JPL
                submitter.type: nasa-center
                nasa.center: JPL
                nasa.ammos_element: MPSA
                nasa.distribution: open-source

      - name: Verification & Formal Methods
        items:
          - name: Kodiak
            homepage_url: https://github.com/nasa/Kodiak
            logo: placeholder.svg
            description: >-
              C++ library for rigorous verification of expressions
              involving nonlinear real arithmetic. Implements a
              generic branch-and-bound algorithm used for formal
              certification of safety-critical numerical software.
            repo_url: https://github.com/nasa/Kodiak
            license: NASA-1.3
            project: larc
            extra:
              tag:
                - nasa-center
                - larc
              annotations:
                submitter.org: LaRC
                submitter.type: nasa-center
                nasa.center: LaRC
                nasa.distribution: open-source

          - name: PVS Library
            homepage_url: https://github.com/nasa/pvslib
            logo: placeholder.svg
            description: >-
              NASA Langley library of formalized mathematics for the
              Prototype Verification System (PVS) theorem prover —
              theories spanning real analysis, control, and aerospace
              algorithms used in mission-critical software V&V.
              Companion VSCode-PVS IDE listed below.
            repo_url: https://github.com/nasa/pvslib
            license: NASA-1.3
            project: larc
            additional_repos:
              - repo_url: https://github.com/nasa/vscode-pvs
                license: NASA-1.3
            extra:
              tag:
                - nasa-center
                - larc
              annotations:
                submitter.org: LaRC
                submitter.type: nasa-center
                nasa.center: LaRC
                nasa.distribution: open-source

  # ============================================================
  # AMMOS quick-filter category. Items appear here via `second_path:
  # ["AMMOS / <element>"]` on the original entry — each AMMOS item
  # lives in its primary mission-software category and is also
  # surfaced under AMMOS / <element> for the program audience. The
  # category is only referenced by the AMMOS group (settings.yml),
  # so AMMOS items aren't duplicated in the All view.
  # ============================================================

  - name: AMMOS
    subcategories:
      - name: MPSA
        items: []
      - name: IDS
        items: []
      - name: MCS
        items: []

  # ============================================================
  # Members — organizations contributing software to the landscape.
  # These categories only appear in the Members tab (see settings.yml
  # `groups`). Items here are organizations, not software projects:
  # they have name + homepage_url + logo, no repo_url/license.
  # ============================================================

  - name: NASA Centers
    subcategories:
      - name: Field Centers
        items:
          - name: Ames Research Center
            homepage_url: https://www.nasa.gov/ames/
            logo: nasa-meatball.svg
            description: >-
              NASA's Silicon Valley center — intelligent systems, autonomy,
              robotics, supercomputing, and Earth/space science. Home of
              the AMES Stereo Pipeline, Vision Workbench, EUROPA AI
              planner, and contributing center for Open MCT.
            crunchbase: https://www.crunchbase.com/organization/nasa

          - name: Glenn Research Center
            homepage_url: https://www.nasa.gov/glenn/
            logo: nasa-meatball.svg
            description: >-
              NASA Glenn (Cleveland, OH) — propulsion, power, communications,
              and aeronautics systems for space and aviation.
            crunchbase: https://www.crunchbase.com/organization/nasa

          - name: Goddard Space Flight Center
            homepage_url: https://www.nasa.gov/goddard/
            logo: nasa-gsfc.svg
            description: >-
              NASA Goddard (Greenbelt, MD) — Earth observation, astrophysics,
              heliophysics. Home of cFS, OSAL, GMSEC, and GIBS/Worldview.
            crunchbase: https://www.crunchbase.com/organization/nasa

          - name: Jet Propulsion Laboratory
            homepage_url: https://www.jpl.nasa.gov/
            logo: nasa-jpl.svg
            description: >-
              JPL (Pasadena, CA) — robotic planetary exploration and Earth
              science, managed for NASA by Caltech. Home of AMMOS, F´,
              ITS_LIVE, and many flight projects.
            crunchbase: https://www.crunchbase.com/organization/nasa-jpl

          - name: Johnson Space Center
            homepage_url: https://www.nasa.gov/johnson/
            logo: nasa-meatball.svg
            description: >-
              NASA Johnson (Houston, TX) — human spaceflight: ISS, Artemis,
              crew vehicle development. Home of Trick and CCDD.
            crunchbase: https://www.crunchbase.com/organization/nasa

          - name: Langley Research Center
            homepage_url: https://www.nasa.gov/langley/
            logo: nasa-meatball.svg
            description: >-
              NASA Langley (Hampton, VA) — aeronautics research and formal
              software verification (PVS, Kodiak, PLEXIL).
            crunchbase: https://www.crunchbase.com/organization/nasa

          - name: Marshall Space Flight Center
            homepage_url: https://www.nasa.gov/marshall/
            logo: nasa-meatball.svg
            description: >-
              NASA Marshall (Huntsville, AL) — propulsion, SLS, and Earth
              science applications via NASA-IMPACT. Hosts ITSC, GHRC, MSFC
              science teams contributing to mission software.
            crunchbase: https://www.crunchbase.com/organization/nasa

