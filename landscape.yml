# yaml-language-server: $schema=https://raw.githubusercontent.com/cncf/landscape2/refs/heads/main/docs/config/schema/data.schema.json
#
# Open Mission Software Landscape — data file
#
# To add an item:
#   * Find the right category and subcategory below.
#   * Insert your item alphabetically by `name` within that subcategory.
#   * Provide a real SVG logo in logos/ if you have one; otherwise reference
#     the temporary `placeholder.svg`.
#   * Open a PR.
#
# See CONTRIBUTING.md for inclusion criteria and docs/annotation-schema.md
# for the NASA / partner annotation conventions.

categories:
  - name: Mission Design & Navigation
    subcategories:
      - name: Mission Analysis & Trajectory Design
        items:
          - name: Dymos
            homepage_url: https://github.com/OpenMDAO/dymos
            logo: dymos.svg
            description: >-
              Library for solving general optimal control problems within
              the OpenMDAO multidisciplinary optimization framework.
              Widely used for trajectory optimization, vehicle design,
              and coupled-systems analysis.
            repo_url: https://github.com/OpenMDAO/dymos
            license: Apache-2.0
            project: grc
            extra:
              tag:
                - nasa-center
                - grc
              annotations:
                submitter.org: GRC
                submitter.type: nasa-center
                nasa.center: GRC
                nasa.distribution: open-source

          - name: GMAT
            homepage_url: https://software.nasa.gov/software/GSC-17177-1
            logo: gmat.svg
            description: >-
              General Mission Analysis Tool. Open-source mission analysis,
              trajectory optimization, orbit determination, and maneuver
              design system used by NASA, industry, and academia for
              end-to-end mission design from LEO through interplanetary
              trajectories.
            repo_url: https://github.com/nasa/GMAT
            license: Apache-2.0
            project: gsfc
            extra:
              tag:
                - nasa-center
                - gsfc
              documentation_url: https://documentation.help/GMAT/
              annotations:
                submitter.org: GSFC
                submitter.type: nasa-center
                nasa.center: GSFC
                nasa.distribution: open-source
                nasa.missions: "LRO, MAVEN, OSIRIS-REx, Artemis (analysis support)"

          - name: OpenMDAO
            homepage_url: https://openmdao.org/
            logo: openmdao.svg
            description: >-
              Open-source framework for multidisciplinary design analysis
              and optimization (MDAO). Heavily used for trajectory
              optimization, aerospace vehicle design, and coupled-systems
              analysis.
            repo_url: https://github.com/OpenMDAO/OpenMDAO
            license: Apache-2.0
            project: grc
            extra:
              tag:
                - nasa-center
                - grc
              documentation_url: https://openmdao.org/newdocs/versions/latest/main.html
              annotations:
                submitter.org: GRC
                submitter.type: nasa-center
                nasa.center: GRC
                nasa.distribution: open-source

  - name: Mission Planning, Sequencing & Analysis
    subcategories:
      - name: Activity Planning & Scheduling
        items:
          - name: EUROPA
            homepage_url: https://github.com/nasa/europa
            logo: placeholder.svg
            description: >-
              Extendable Uniform Remote Operations Planning
              Architecture. General-purpose AI planning and
              constraint-reasoning framework — generates plans for
              complex parallel activities, with reusable components
              for time, resources, and constraint propagation.
            repo_url: https://github.com/nasa/europa
            license: NASA-1.3
            project: arc
            extra:
              tag:
                - nasa-center
                - arc
              annotations:
                submitter.org: ARC
                submitter.type: nasa-center
                nasa.center: ARC
                nasa.distribution: open-source

          - name: PlanDev
            homepage_url: https://nasa-ammos.github.io/plandev-docs/
            logo: plandev.svg
            second_path:
              - "AMMOS / MPSA"
            description: >-
              Modeling and planning system for spacecraft missions
              (formerly Aerie). Provides a modular activity-planning
              framework with a web UI, scheduler, simulation engine, and
              external constraint checker. Used by multiple JPL missions
              for next-generation activity planning.
            repo_url: https://github.com/NASA-AMMOS/plandev
            license: MIT
            project: ammos
            extra:
              tag:
                - nasa-center
                - jpl
                - mpsa
              documentation_url: https://nasa-ammos.github.io/plandev-docs/
              annotations:
                submitter.org: JPL
                submitter.type: nasa-center
                nasa.center: JPL
                nasa.ammos_element: MPSA
                nasa.distribution: open-source
                nasa.standards: "seq-json"

      - name: Sequence Generation & Specifications
        items:
          - name: PLEXIL-V
            homepage_url: https://plexil.sourceforge.net/
            logo: placeholder.svg
            description: >-
              Plan Execution Interchange Language (V). Synchronous,
              deterministic language and runtime for commanding and
              monitoring autonomous systems — used to specify and
              execute spacecraft and robotic plans with predictable
              timing semantics.
            repo_url: https://github.com/nasa/PLEXIL-V
            license: NASA-1.3
            project: larc
            extra:
              tag:
                - nasa-center
                - larc
              annotations:
                submitter.org: LaRC
                submitter.type: nasa-center
                nasa.center: LaRC
                nasa.distribution: open-source

  - name: Instrument Data System
    subcategories:
      - name: Science Data Visualization & Mapping
        items:
          - name: AMES Stereo Pipeline
            homepage_url: https://github.com/NeoGeographyToolkit/StereoPipeline
            logo: placeholder.svg
            description: >-
              NASA Ames Stereo Pipeline (ASP). Suite of automated
              geodesy and stereogrammetry tools for processing
              planetary imagery — produces Digital Terrain Models
              from imagery captured by orbiting and landed robotic
              explorers across the solar system.
            repo_url: https://github.com/NeoGeographyToolkit/StereoPipeline
            license: Apache-2.0
            project: arc
            extra:
              tag:
                - nasa-center
                - arc
              annotations:
                submitter.org: ARC
                submitter.type: nasa-center
                nasa.center: ARC
                nasa.distribution: open-source

          - name: DERT
            homepage_url: https://github.com/nasa/DERT
            logo: dert.svg
            description: >-
              Desktop Exploration of Remote Terrain. 3D viewer for
              large Digital Terrain Models — built to help science
              and engineering teams explore topography and spatial
              relationships on planetary surfaces.
            repo_url: https://github.com/nasa/DERT
            license: NASA-1.3
            project: arc
            extra:
              tag:
                - nasa-center
                - arc
              annotations:
                submitter.org: ARC
                submitter.type: nasa-center
                nasa.center: ARC
                nasa.distribution: open-source

          - name: landmark_tools
            homepage_url: https://github.com/NASA-JPL/landmark_tools
            logo: placeholder.svg
            description: >-
              Cross-validates planetary Digital Elevation Models
              (DEMs) using dense correlation patch matching —
              identifies inconsistencies between independent
              terrain reconstructions of the same area.
            repo_url: https://github.com/NASA-JPL/landmark_tools
            license: Apache-2.0
            project: jpl
            extra:
              tag:
                - nasa-center
                - jpl
              annotations:
                submitter.org: JPL
                submitter.type: nasa-center
                nasa.center: JPL
                nasa.distribution: open-source

          - name: MMGIS
            homepage_url: https://github.com/NASA-AMMOS/MMGIS
            logo: mmgis.svg
            second_path:
              - "AMMOS / IDS"
            description: >-
              Multi-Mission Geographic Information System. Web-based
              mapping and spatial data infrastructure for Earth, lunar, and
              planetary visualization, research, science, planning, and
              operations.
            repo_url: https://github.com/NASA-AMMOS/MMGIS
            license: Apache-2.0
            project: ammos
            extra:
              tag:
                - nasa-center
                - jpl
                - ids
              documentation_url: https://nasa-ammos.github.io/MMGIS/
              package_manager_url: https://pypi.org/project/mmgis-py/
              annotations:
                submitter.org: JPL
                submitter.type: nasa-center
                nasa.center: JPL
                nasa.ammos_element: IDS
                nasa.distribution: open-source
                nasa.missions: "M2020 (Perseverance), MSL (Curiosity), various lunar"

          - name: VICAR
            homepage_url: https://www-mipl.jpl.nasa.gov/vicar_open.html
            logo: placeholder.svg
            second_path:
              - "AMMOS / IDS"
            description: >-
              Video Image Communication And Retrieval. JPL's
              general-purpose digital image processing system,
              continuously developed since 1966. Used to process
              multi-dimensional imaging data from Voyager, Mars
              missions, Cassini, Galileo, and many others. Now
              maintained as an AMMOS Instrument Data System (IDS)
              element in github.com/NASA-AMMOS.
            repo_url: https://github.com/NASA-AMMOS/VICAR
            license: NASA-1.3
            project: ammos
            extra:
              tag:
                - nasa-center
                - jpl
                - ids
              annotations:
                submitter.org: JPL
                submitter.type: nasa-center
                nasa.center: JPL
                nasa.ammos_element: IDS
                nasa.distribution: open-source
                nasa.missions: "Voyager, Mars (multiple), Cassini, Galileo, many others"

          - name: Vision Workbench
            homepage_url: https://github.com/nasa/visionworkbench
            logo: placeholder.svg
            description: >-
              Modular, extensible computer vision framework for
              automated science and engineering analysis of large
              satellite and planetary imagery. Foundation that NASA
              Ames Stereo Pipeline is built on top of.
            repo_url: https://github.com/nasa/visionworkbench
            license: NASA-1.3
            project: arc
            extra:
              tag:
                - nasa-center
                - arc
              annotations:
                submitter.org: ARC
                submitter.type: nasa-center
                nasa.center: ARC
                nasa.distribution: open-source

      - name: Instrument Toolkit
        items:
          - name: AIT
            homepage_url: https://ait-core.readthedocs.io/
            logo: placeholder.svg
            second_path:
              - "AMMOS / IDS"
            description: >-
              AMMOS Instrument Toolkit. Python-based software suite for
              ground data systems — commanding, telemetry uplink/downlink,
              sequencing, and EGSE for instrument-class missions. Suite
              comprises AIT-Core (the foundational library, primary repo),
              AIT-GUI (web UI), and AIT-DSN (Deep Space Network tools).
            repo_url: https://github.com/NASA-AMMOS/AIT-Core
            license: MIT
            project: ammos
            additional_repos:
              - repo_url: https://github.com/NASA-AMMOS/AIT-GUI
                license: MIT
              - repo_url: https://github.com/NASA-AMMOS/AIT-DSN
                license: MIT
            extra:
              tag:
                - nasa-center
                - jpl
                - ids
              documentation_url: https://ait-core.readthedocs.io/
              package_manager_url: https://pypi.org/project/ait-core/
              annotations:
                submitter.org: JPL
                submitter.type: nasa-center
                nasa.center: JPL
                nasa.ammos_element: IDS
                nasa.distribution: open-source
                nasa.missions: "EMIT, ECOSTRESS, OCO-3, ISS instruments"
                nasa.standards: "CCSDS, XTCE"

          - name: PyAMPR
            homepage_url: https://github.com/nasa/PyAMPR
            logo: placeholder.svg
            description: >-
              Python toolkit for reading and processing brightness
              temperature data from the Advanced Microwave Precipitation
              Radiometer (AMPR), a NASA airborne instrument flown on
              hurricane and precipitation field campaigns.
            repo_url: https://github.com/nasa/PyAMPR
            license: NASA-1.3
            project: msfc
            extra:
              tag:
                - nasa-center
                - msfc
              annotations:
                submitter.org: MSFC
                submitter.type: nasa-center
                nasa.center: MSFC
                nasa.distribution: open-source

  - name: Mission Control System
    subcategories:
      - name: Operations Visualization
        items:
          - name: cFS-EDS-GroundStation
            homepage_url: https://github.com/nasa/cFS-EDS-GroundStation
            logo: placeholder.svg
            description: >-
              Python-based graphical telemetry and telecommand frontend
              for any mission running Core Flight System (cFS) with
              CCSDS Electronic Data Sheets (EDS). Generic ground station
              GUI that adapts to a mission's EDS definitions.
            repo_url: https://github.com/nasa/cFS-EDS-GroundStation
            license: Apache-2.0
            project: grc
            extra:
              tag:
                - nasa-center
                - grc
              annotations:
                submitter.org: GRC
                submitter.type: nasa-center
                nasa.center: GRC
                nasa.distribution: open-source
                nasa.standards: "CCSDS, EDS"

          - name: Open MCT
            homepage_url: https://nasa.github.io/openmct/
            logo: openmct.svg
            second_path:
              - "AMMOS / MCS"
            description: >-
              Next-generation mission operations visualization framework.
              Used for displaying telemetry data via a customizable,
              web-based UI. Co-developed by JPL and Ames; deployed on
              multiple flight missions and used in commercial spaceflight.
              Companion demo and tutorial repos listed below.
            repo_url: https://github.com/nasa/openmct
            license: Apache-2.0
            project: ammos
            additional_repos:
              - repo_url: https://github.com/nasa/openmct-demo
                license: NASA-1.3
              - repo_url: https://github.com/nasa/openmct-tutorial
                license: NASA-1.3
            extra:
              tag:
                - nasa-center
                - jpl
                - arc
                - mcs
              documentation_url: https://nasa.github.io/openmct/documentation/
              package_manager_url: https://www.npmjs.com/package/openmct
              annotations:
                submitter.org: JPL
                submitter.type: nasa-center
                nasa.center: JPL
                nasa.contributing_centers: "ARC"
                nasa.ammos_element: MCS
                nasa.distribution: open-source
                nasa.missions: "Multiple JPL missions, commercial deployments"

      - name: Mission Control Integration
        items:
          - name: OpenMCT-MCWS
            homepage_url: https://github.com/NASA-AMMOS/openmct-mcws
            logo: placeholder.svg
            second_path:
              - "AMMOS / IDS"
            description: >-
              Open MCT plugins providing connectivity to AMMOS Mission
              data Processing and Control System (MPCS) backends —
              historical and realtime telemetry, EVRs, commands, and frames.
            repo_url: https://github.com/NASA-AMMOS/openmct-mcws
            license: Apache-2.0
            project: ammos
            parent_project: Open MCT
            extra:
              tag:
                - nasa-center
                - jpl
                - ids
              annotations:
                submitter.org: JPL
                submitter.type: nasa-center
                nasa.center: JPL
                nasa.ammos_element: IDS
                nasa.distribution: open-source

  - name: Engineering Software
    subcategories:
      - name: Flight Software Frameworks
        items:
          - name: CCDD
            homepage_url: https://github.com/nasa/CCDD
            logo: placeholder.svg
            description: >-
              Core Flight System Command and Data Dictionary tool. Manages
              data structures for cFS and cFS applications — telemetry
              data, command definitions, and other data products — and
              generates source code, scripts, and tables consumed by
              cFS-based flight software.
            repo_url: https://github.com/nasa/CCDD
            license: NASA-1.3
            project: jsc
            extra:
              tag:
                - nasa-center
                - jsc
              annotations:
                submitter.org: JSC
                submitter.type: nasa-center
                nasa.center: JSC
                nasa.distribution: open-source

          - name: cFS (Core Flight System)
            homepage_url: https://github.com/nasa/cFS
            logo: cfs.svg
            description: >-
              Core Flight System. A platform- and project-independent
              reusable flight software architecture and suite of
              mission-agnostic applications. Foundation for many GSFC and
              Agency-wide flight missions. Ships with a suite of standard
              mission applications (CF, CS, DS, FM, HK, HS, LC, MD, MM,
              SBN, SC, SCA, SCH) listed below.
            repo_url: https://github.com/nasa/cFS
            license: Apache-2.0
            project: gsfc
            additional_repos:
              - repo_url: https://github.com/nasa/CF
                license: NASA-1.3
              - repo_url: https://github.com/nasa/CS
                license: NASA-1.3
              - repo_url: https://github.com/nasa/DS
                license: NASA-1.3
              - repo_url: https://github.com/nasa/FM
                license: NASA-1.3
              - repo_url: https://github.com/nasa/HK
                license: NASA-1.3
              - repo_url: https://github.com/nasa/HS
                license: NASA-1.3
              - repo_url: https://github.com/nasa/LC
                license: NASA-1.3
              - repo_url: https://github.com/nasa/MD
                license: NASA-1.3
              - repo_url: https://github.com/nasa/MM
                license: NASA-1.3
              - repo_url: https://github.com/nasa/SBN
                license: NASA-1.3
              - repo_url: https://github.com/nasa/SC
                license: NASA-1.3
              - repo_url: https://github.com/nasa/SCA
                license: NASA-1.3
              - repo_url: https://github.com/nasa/SCH
                license: NASA-1.3
            extra:
              tag:
                - nasa-center
                - gsfc
              documentation_url: https://github.com/nasa/cFS/tree/main/docs
              annotations:
                submitter.org: GSFC
                submitter.type: nasa-center
                nasa.center: GSFC
                nasa.distribution: open-source
                nasa.missions: "LRO, MMS, GPM, RBSP, SunRISE, many others"

          - name: F´ (F Prime)
            homepage_url: https://nasa.github.io/fprime/
            logo: fprime.svg
            description: >-
              Component-driven flight software framework for spaceflight
              and embedded systems. Designed for small-scale flight systems
              but flown on larger missions; deployed on the Mars Helicopter
              (Ingenuity), CubeSats, and SmallSats.
            repo_url: https://github.com/nasa/fprime
            license: Apache-2.0
            project: jpl
            extra:
              tag:
                - nasa-center
                - jpl
              documentation_url: https://nasa.github.io/fprime/UsersGuide/guide.html
              annotations:
                submitter.org: JPL
                submitter.type: nasa-center
                nasa.center: JPL
                nasa.distribution: open-source
                nasa.missions: "Ingenuity (Mars Helicopter), MarCO, ASTERIA, LunaH-Map, ISAAC"

          - name: OSAL
            homepage_url: https://github.com/nasa/osal
            logo: placeholder.svg
            description: >-
              Operating System Abstraction Layer. C library that
              isolates embedded application software from the
              underlying RTOS through a generic, portable interface.
              Foundational dependency that cFS relies on for
              portability across operating systems and hardware.
            repo_url: https://github.com/nasa/osal
            license: NASA-1.3
            project: gsfc
            extra:
              tag:
                - nasa-center
                - gsfc
              annotations:
                submitter.org: GSFC
                submitter.type: nasa-center
                nasa.center: GSFC
                nasa.distribution: open-source

      - name: Simulation & Test
        items:
          - name: Input Device Framework (IDF)
            homepage_url: https://github.com/nasa/idf
            logo: placeholder.svg
            description: >-
              Framework for mapping physical input devices — joysticks,
              gaming controllers, custom control panels — to
              application-specific virtual controller interfaces. Used in
              human-spaceflight simulator and training applications to
              decouple device-independent code from hardware specifics.
            repo_url: https://github.com/nasa/idf
            license: NASA-1.3
            project: jsc
            extra:
              tag:
                - nasa-center
                - jsc
              annotations:
                submitter.org: JSC
                submitter.type: nasa-center
                nasa.center: JSC
                nasa.distribution: open-source

          - name: NOS3
            homepage_url: https://github.com/nasa/nos3
            logo: placeholder.svg
            description: >-
              NASA Operational Simulator for Small Satellites. A test bed
              for small satellite missions providing a software environment
              for flight software development, testing, and operations.
            repo_url: https://github.com/nasa/nos3
            license: NASA-1.3
            project: gsfc
            extra:
              tag:
                - nasa-center
                - gsfc
              annotations:
                submitter.org: GSFC
                submitter.type: nasa-center
                nasa.center: GSFC
                nasa.distribution: open-source

          - name: Prognostics Algorithm Library
            homepage_url: https://github.com/nasa/PrognosticsAlgorithmLibrary
            logo: placeholder.svg
            description: >-
              Suite of MATLAB algorithms for model-based prognostics —
              state estimation, prediction, and remaining-useful-life
              computation for engineering systems. Developed at the
              ARC Prognostics Center of Excellence and applied to
              spacecraft electrical-power V&V.
            repo_url: https://github.com/nasa/PrognosticsAlgorithmLibrary
            license: NASA-1.3
            project: arc
            extra:
              tag:
                - nasa-center
                - arc
              annotations:
                submitter.org: ARC
                submitter.type: nasa-center
                nasa.center: ARC
                nasa.distribution: open-source

          - name: Prognostics Model Library
            homepage_url: https://github.com/nasa/PrognosticsModelLibrary
            logo: placeholder.svg
            description: >-
              Modeling framework for prognostics — defines and builds
              models of engineering systems used in remaining-useful-
              life computation. Companion to Prognostics Algorithm
              Library.
            repo_url: https://github.com/nasa/PrognosticsModelLibrary
            license: NASA-1.3
            project: arc
            parent_project: Prognostics Algorithm Library
            extra:
              tag:
                - nasa-center
                - arc
              annotations:
                submitter.org: ARC
                submitter.type: nasa-center
                nasa.center: ARC
                nasa.distribution: open-source

          - name: Trick
            homepage_url: https://nasa.github.io/trick/
            logo: placeholder.svg
            description: >-
              Trick Simulation Environment. A simulation development
              framework providing a common set of simulation capabilities
              and utilities to build simulations automatically. Used
              extensively for human spaceflight vehicle simulation at JSC.
            repo_url: https://github.com/nasa/trick
            license: NASA-1.3
            project: jsc
            extra:
              tag:
                - nasa-center
                - jsc
              documentation_url: https://nasa.github.io/trick/documentation/Documentation-Home.html
              annotations:
                submitter.org: JSC
                submitter.type: nasa-center
                nasa.center: JSC
                nasa.distribution: open-source

          - name: TrickFMI
            homepage_url: https://github.com/nasa/TrickFMI
            logo: placeholder.svg
            description: >-
              Functional Mockup Interface (FMI) bridge for Trick-based
              simulations. Lets Trick exchange models with FMI-compliant
