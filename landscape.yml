  - name: NASA Programs
    subcategories:
      - name: Programs
        items:
          - name: AMMOS
            homepage_url: https://ammos.nasa.gov/
            logo: ammos.svg
            description: >-
              Advanced Multi-Mission Operations System. JPL-led, multi-center
              program providing reusable mission ops software (PlanDev,
              MMGIS, AIT, SLIM, OpenMCT-MCWS, seq-json) across NASA flight
              missions.

          - name: NASA-PDS
            homepage_url: https://pds.nasa.gov/
            logo: nasa-meatball.svg
            description: >-
              Planetary Data System. JPL-managed, federated archive
              for NASA's planetary science data — discipline nodes
              (Atmospheres, Geosciences, Imaging, NAIF, Plasma,
              Ring-Moon, Small Bodies) plus an Engineering Node that
              maintains the PDS4 Information Model and core tooling
              (validate, deep-archive, transform, registry).

