            repo_url: https://github.com/nasa/TrickFMI
            license: NASA-1.3
            project: jsc
            parent_project: Trick
            extra:
              tag:
                - nasa-center
                - jsc
              annotations:
                submitter.org: JSC
                submitter.type: nasa-center
                nasa.center: JSC
                nasa.distribution: open-source

      - name: Communications & Networking
        items:
          - name: Channel Emulator
            homepage_url: https://github.com/nasa/channel-emulator
            logo: placeholder.svg
            description: >-
              Software-based network testing tool providing data framing,
