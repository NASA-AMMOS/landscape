            repo_url: https://github.com/nasa/channel-emulator
            license: NASA-1.3
            project: grc
            extra:
              tag:
                - nasa-center
                - grc
              annotations:
                submitter.org: GRC
                submitter.type: nasa-center
                nasa.center: GRC
                nasa.distribution: open-source

          - name: GMSEC API
            homepage_url: https://github.com/nasa/GMSEC_API
            logo: placeholder.svg
            description: >-
              Goddard Mission Services Evolution Center API.
              Publish-subscribe messaging middleware for ground data
              systems integration — coordinates ground software
              components across mission operations programs at GSFC.
            repo_url: https://github.com/nasa/GMSEC_API
            license: NASA-1.3
            project: gsfc
            extra:
              tag:
                - nasa-center
                - gsfc
              annotations:
                submitter.org: GSFC
                submitter.type: nasa-center
                nasa.center: GSFC
                nasa.distribution: open-source

          - name: ION-DTN
            homepage_url: https://github.com/NASA-JPL/ION-DTN
            logo: placeholder.svg
            description: >-
              Interplanetary Overlay Network. NASA's reference
              implementation of the CCSDS/IETF Delay-Tolerant
              Networking (DTN) protocol stack — Bundle Protocol,
              CFDP, and supporting services for deep-space
              communications. Streamlined ion-core packaging and
              pyion Python bindings listed below.
