name: build-and-deploy

on:
  push:
    branches: [main]
  schedule:
    # Nightly rebuild to refresh GitHub-derived enrichment data (stars,
    # contributors, last commit, etc.) without requiring a code change.
    - cron: '23 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install landscape2
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/cncf/landscape2/releases/download/v1.1.0/landscape2-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore landscape2 cache
        uses: actions/cache@v4
        with:
          path: .landscape2-cache
          key: landscape2-${{ github.run_id }}
          restore-keys: |
            landscape2-

      - name: Build landscape
        env:
          GITHUB_TOKENS: ${{ secrets.LANDSCAPE_GH_TOKENS }}
        run: |
          landscape2 build \
            --data-file landscape.yml \
            --settings-file settings.yml \
            --guide-file guide.yml \
            --logos-path logos \
            --cache-dir .landscape2-cache \
            --output-dir build

      - name: Strip hardcoded "TAG " prefix from tag chips
        # landscape2's chip template is `<div>TAG ` — every rendered tag
        # chip reads "TAG <name>" (e.g. "TAG JPL"). The template is
        # hardcoded in the bundled JS with no settings flag to disable.
        # Patch the built bundle to drop the redundant "TAG " label.
        # Re-check landscape2 versions on upgrade — this can no-op
        # silently if the template changes.
        run: |
          set -e
          before=$(grep -ohc '<div>TAG ' build/assets/*.js | paste -sd+ - | bc || echo 0)
          find build/assets -name '*.js' -exec sed -i 's|<div>TAG |<div>|g' {} +
          after=$(grep -ohc '<div>TAG ' build/assets/*.js | paste -sd+ - | bc || echo 0)
          echo "stripped chip prefix: $before occurrences -> $after"
          if [ "$before" = "0" ]; then
            echo "WARNING: didn't find the chip-prefix template; landscape2 may have changed it." >&2
          fi

      - name: Override page title to "Open Mission Landscape"
        # landscape2's HTML template hardcodes `{{ foundation }} Landscape`
        # for <title>, og:title, twitter:title, and the JSON-LD name. With
        # foundation=NASA (driving the per-card NASA AMMOS / NASA <CENTER>
        # badges), the tab title becomes "NASA Landscape" — but our actual
        # site brand is "Open Mission Landscape" (matches our header
        # wordmark). Patch the built HTML to use the correct title.
        run: |
          set -e
          before=$(grep -ohc 'NASA Landscape' build/index.html build/404.html 2>/dev/null | paste -sd+ - | bc || echo 0)
          find build -maxdepth 2 -name '*.html' -exec sed -i 's|NASA Landscape|Open Mission Landscape|g' {} +
          after=$(grep -ohc 'NASA Landscape' build/index.html build/404.html 2>/dev/null | paste -sd+ - | bc || echo 0)
          echo "rewrote title: $before occurrences -> $after"

      - name: Copy index.html to 404.html (SPA routing on GH Pages)
        run: cp build/index.html build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
