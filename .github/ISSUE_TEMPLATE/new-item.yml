name: Propose new landscape item
description: Suggest an open-source mission software project to add to the landscape
title: "Add: <project name>"
labels: ["new-item"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an addition. NASA staff and external partners
        are equally welcome. After triage, you (or a maintainer) will open
        a PR adding the item to `landscape.yml`.

  - type: input
    id: name
    attributes:
      label: Project name
      placeholder: "e.g., Open MCT"
    validations:
      required: true

  - type: input
    id: repo
    attributes:
      label: Repository URL
      placeholder: "https://github.com/<org>/<repo>"
    validations:
      required: true

  - type: input
    id: homepage
    attributes:
      label: Homepage URL
      placeholder: "https://..."

  - type: dropdown
    id: license
    attributes:
      label: License
      description: "Must be OSI-approved or NASA-1.3 (NOSA)."
      options:
        - Apache-2.0
        - MIT
        - BSD-3-Clause
        - BSD-2-Clause
        - GPL-3.0
        - GPL-2.0
        - LGPL-3.0
        - MPL-2.0
        - AGPL-3.0
        - NASA-1.3
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: affiliation
    attributes:
      label: Primary affiliation
      options:
        - NASA — JPL
        - NASA — GSFC
        - NASA — ARC
        - NASA — JSC
        - NASA — GRC
        - NASA — MSFC
        - NASA — LaRC
        - NASA — KSC
        - NASA — JHU/APL
        - NASA — Other center
        - Partner — Other government agency
        - Partner — University
        - Partner — Commercial
        - Partner — Foundation / nonprofit
        - Partner — Independent / individual
        - Joint NASA + partner
    validations:
      required: true

  - type: input
    id: organization
    attributes:
      label: Organization name (if partner-affiliated)
      description: "e.g., ESA, MIT, Open Lunar Foundation, Acme Aerospace. Leave blank for NASA-only items."

  - type: dropdown
    id: category
    attributes:
      label: Best-fit category
      options:
        - Mission Design & Navigation
        - Mission Planning, Sequencing & Analysis
        - Instrument Data System
        - Mission Control System
        - Ground Software Foundations
        - Earth & Science Data Systems
        - Developer Tools & Standards
        - Not sure — please advise
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short description
      description: "1–3 sentences. What does this software do, who uses it?"
    validations:
      required: true

  - type: textarea
    id: missions
    attributes:
      label: Mission heritage (optional)
      description: "Comma-separated list of missions or operational deployments that have used this software."

  - type: checkboxes
    id: scope-confirm
    attributes:
      label: Scope confirmation
      options:
        - label: I confirm this software is open source (OSI-approved or NOSA license).
          required: true
        - label: I confirm this software is mission-related (mission design, ground systems, flight software, ops, science data, or directly supporting standards).
          required: true
