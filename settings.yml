# yaml-language-server: $schema=https://raw.githubusercontent.com/cncf/landscape2/refs/heads/main/docs/config/schema/settings.schema.json
#
# Landscape2 settings for the Open Mission Software Landscape.
# See https://github.com/cncf/landscape2/blob/main/docs/config/settings.yml
# for the full reference.

foundation: NASA

url: https://nasa-ammos.github.io/landscape

# Hosted at github.io/<org>/<repo>, so the SPA needs to know the
# subpath; without this, in-app navigation routes to /<route>
# (root) instead of /landscape/<route> and 404s.
base_path: /landscape

# Brand colors (RGBA strings — required format)
colors:
  color1: "rgba(11, 61, 145, 1)"   # NASA blue
  color2: "rgba(252, 61, 33, 1)"   # NASA red
  color3: "rgba(11, 61, 145, 0.75)"
  color4: "rgba(11, 61, 145, 0.5)"
  color5: "rgba(11, 61, 145, 0.25)"
  color6: "rgba(0, 0, 0, 0.85)"
  color7: "rgba(0, 0, 0, 0.65)"

header:
  links:
    github: https://github.com/NASA-AMMOS/landscape
  # Header wordmark — local path is resolved by the landscape2 build.
  logo: images/header-logo.svg

images:
  favicon: https://www.nasa.gov/favicon.ico

# Top-level groups: shape the navigation. The "All" group is listed
# first so it's the default tab — without it, defining the other
# groups hides anything not listed in one of them ("when groups are
# used, categories not listed in any group won't be displayed").
groups:
  - name: All
    normalized_name: all
    categories:
      - Mission Design & Navigation
      - Mission Planning, Sequencing & Analysis
      - Instrument Data System
      - Mission Control System
      - Ground Software Foundations
      - Earth & Science Data Systems
      - Developer Tools & Standards
  - name: Mission Operations
    normalized_name: ops
    categories:
      - Mission Design & Navigation
      - Mission Planning, Sequencing & Analysis
      - Instrument Data System
      - Mission Control System
  - name: Foundations & Cross-Cutting
    normalized_name: foundations
    categories:
      - Ground Software Foundations
      - Earth & Science Data Systems
      - Developer Tools & Standards
  # Members tab — organizations contributing software to the landscape
  # (parallel to CNCF's Platinum/Gold/etc. members tab). The categories
  # below are intentionally NOT in the All / Mission Operations /
  # Foundations groups, so member orgs only show in the Members view.
  - name: Members
    normalized_name: members
    categories:
      - NASA Centers
      - NASA Programs
      - Agency Partners
      - Academic & FFRDC
      - Commercial Partners
      - Foundations & Standards

# Featured-item rules drive the under-card "NASA AMMOS" / "NASA JPL"
# label visible in grid mode (parallel to CNCF's "CNCF GRADUATED" /
# "CNCF INCUBATING" labels). Items match by their `project:` value
# (the field is internally called `maturity`); items without a project
# field don't get a label (reserved for future non-NASA entries).
featured_items:
  - field: maturity
    options:
      - value: ammos
        label: NASA AMMOS
        order: 1
      - value: jpl
        label: NASA JPL
        order: 2
      - value: gsfc
        label: NASA GSFC
        order: 3
      - value: arc
        label: NASA ARC
        order: 4
      - value: jsc
        label: NASA JSC
        order: 5
      - value: grc
        label: NASA GRC
        order: 6
      - value: msfc
        label: NASA MSFC
        order: 7
      - value: larc
        label: NASA LARC
        order: 8

screenshot_width: 1920

# Default item size in the grid. landscape2 hard-codes a discrete
# zoom ladder per size; "large" gives both a bigger starting zoom
# (80x72px cards vs 50x45) and a bigger ceiling (105x94 vs 75x68).
# Recommended when the landscape has fewer items.
grid_items_size: large

categories:
  # ---- Software categories ----
  - name: Mission Design & Navigation
    subcategories:
      - Mission Analysis & Trajectory Design
  - name: Mission Planning, Sequencing & Analysis
    subcategories:
      - Activity Planning & Scheduling
      - Sequence Generation & Specifications
  - name: Instrument Data System
    subcategories:
      - Science Data Visualization & Mapping
      - Instrument Toolkits & GDS
  - name: Mission Control System
    subcategories:
      - Operations Visualization
      - Mission Control Integration
  - name: Ground Software Foundations
    subcategories:
      - Flight Software Frameworks
      - Simulation & Test
      - Communications & Networking
      - Robotics & Autonomy
  - name: Earth & Science Data Systems
    subcategories:
      - Data Management & Pipelines
      - Imagery & Visualization Services
  - name: Developer Tools & Standards
    subcategories:
      - Best Practices & Lifecycle
      - Verification & Formal Methods

  # ---- Member categories (only visible inside the Members group) ----
  - name: NASA Centers
    subcategories:
      - Field Centers
  - name: NASA Programs
    subcategories:
      - Programs
  - name: Agency Partners
    subcategories:
      - Agencies
  - name: Academic & FFRDC
    subcategories:
      - Institutions
  - name: Commercial Partners
    subcategories:
      - Companies
  - name: Foundations & Standards
    subcategories:
      - Organizations
