# yaml-language-server: $schema=https://raw.githubusercontent.com/cncf/landscape2/refs/heads/main/docs/config/schema/settings.schema.json
#
# Landscape2 settings for the Open Mission Software Landscape.
# See https://github.com/cncf/landscape2/blob/main/docs/config/settings.yml
# for the full reference.

foundation: NASA

url: https://nasa-ammos.github.io/landscape

# Hosted at github.io/<org>/<repo>, so the SPA needs to know the
# subpath; without this, in-app navigation routes to /<route>
# (root) instead of /landscape/<route> and 404s.
base_path: /landscape

# Brand colors (RGBA strings — required format)
colors:
  color1: "rgba(11, 61, 145, 1)"   # NASA blue
  color2: "rgba(252, 61, 33, 1)"   # NASA red
  color3: "rgba(11, 61, 145, 0.75)"
  color4: "rgba(11, 61, 145, 0.5)"
  color5: "rgba(11, 61, 145, 0.25)"
  color6: "rgba(0, 0, 0, 0.85)"
  color7: "rgba(0, 0, 0, 0.65)"

header:
  links:
    github: https://github.com/NASA-AMMOS/landscape
  # Header wordmark — local path is resolved by the landscape2 build.
  logo: images/header-logo.svg
  # Banner above the header. Remove this line when the landscape
  # leaves beta. Markdown supported.
  motd: |
    🚧 **Beta** — this landscape is in active development.
    Spotted something missing or wrong?
    [Open an issue](https://github.com/NASA-AMMOS/landscape/issues/new).

images:
  favicon: https://www.nasa.gov/favicon.ico

# Footer text rendered above the (sed-suppressed) "Powered by" line.
# Markdown is preserved by landscape2 via innerHTML.
footer:
  text: |
    *"Somewhere, something incredible is waiting to be known."*
    — Carl Sagan

# Top-level groups: shape the navigation. The "All" group is listed
# first so it's the default tab — without it, defining the other
# groups hides anything not listed in one of them ("when groups are
# used, categories not listed in any group won't be displayed").
groups:
  # NOTE: landscape2's bundled JS treats slug "all" as a magic value
  # that bypasses group filtering — when active it renders items in
  # every category they appear in (primary + additional_categories),
  # double-rendering AMMOS items in this view. We patch that magic
  # out post-build (see .github/workflows/build-and-deploy.yml step
  # "Disable 'all' magic-bypass") so this group filters normally.
  - name: All
    categories:
      - Mission Design & Navigation
      - Mission Planning, Sequencing & Analysis
      - Instrument Data System
      - Mission Control System
      - Engineering Software
      - Science Data Systems
      - Developer Tools & Standards
  - name: Mission Software
    normalized_name: software
    categories:
      - Mission Design & Navigation
      - Mission Planning, Sequencing & Analysis
      - Instrument Data System
      - Mission Control System
  - name: Engineering Software
    categories:
      - Engineering Software
  - name: Developer Tools & Standards
    categories:
      - Developer Tools & Standards
  - name: Science Data
    normalized_name: science-data
    categories:
      - Science Data Systems
  # AMMOS quick-filter view — pulls items via second_path, so AMMOS
  # entries appear here in addition to their primary category.
  - name: AMMOS
    normalized_name: ammos
    categories:
      - AMMOS
  # Organizations tab — orgs contributing software to the landscape.
  # Renamed from "Members" since we don't have a formal membership
  # program; this is just a directory of who's here. The categories
  # below are intentionally NOT in any other group, so these orgs
  # only show in the Organizations view.
  - name: Organizations
    normalized_name: organizations
    categories:
      - NASA Centers
      - NASA Programs
      - Agency Partners
      - Academic & FFRDC
      - Commercial Partners
      - Foundations & Standards

# Featured-item rules drive the under-card "NASA AMMOS" / "NASA JPL"
# label visible in grid mode (parallel to CNCF's "CNCF GRADUATED" /
# "CNCF INCUBATING" labels). Items match by their `project:` value
# (the field is internally called `maturity`); items without a project
# field don't get a label (reserved for future non-NASA entries).
featured_items:
  - field: maturity
    options:
      - value: ammos
        label: NASA AMMOS
        order: 1
      - value: jpl
        label: NASA JPL
        order: 2
      - value: gsfc
        label: NASA GSFC
        order: 3
      - value: arc
        label: NASA ARC
        order: 4
      - value: jsc
        label: NASA JSC
        order: 5
      - value: grc
        label: NASA GRC
        order: 6
      - value: msfc
        label: NASA MSFC
        order: 7
      - value: larc
        label: NASA LARC
        order: 8

screenshot_width: 1920

# Default item size in the grid. landscape2 hard-codes a discrete
# zoom ladder per size; "large" gives both a bigger starting zoom
# (80x72px cards vs 50x45) and a bigger ceiling (105x94 vs 75x68).
# Recommended when the landscape has fewer items.
grid_items_size: large

categories:
  # ---- Software categories ----
  - name: Mission Design & Navigation
    subcategories:
      - Mission Analysis & Trajectory Design
  - name: Mission Planning, Sequencing & Analysis
    subcategories:
      - Activity Planning & Scheduling
      - Sequence Generation & Specifications
  - name: Instrument Data System
    subcategories:
      - Science Data Visualization & Mapping
      - Instrument Toolkit
  - name: Mission Control System
    subcategories:
      - Operations Visualization
      - Mission Control Integration
  - name: Engineering Software
    subcategories:
      - Flight Software Frameworks
      - Simulation & Test
      - Communications & Networking
      - Robotics & Autonomy
  - name: AMMOS
    subcategories:
      - MPSA
      - IDS
      - MCS
  - name: Science Data Systems
    subcategories:
      - Data Management & Pipelines
      - Imagery & Visualization Services
  - name: Developer Tools & Standards
    subcategories:
      - Best Practices & Lifecycle
      - Information Models
      - Verification & Formal Methods

  # ---- Organization categories (only visible inside the Organizations group) ----
  - name: NASA Centers
    subcategories:
      - Field Centers
  - name: NASA Programs
    subcategories:
      - Programs
  - name: Agency Partners
    subcategories:
      - Agencies
  - name: Academic & FFRDC
    subcategories:
      - Institutions
  - name: Commercial Partners
    subcategories:
      - Companies
  - name: Foundations & Standards
    subcategories:
      - Organizations
